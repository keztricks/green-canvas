version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: doorapp_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: doorapp
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - doorapp_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  doorapp_mysql_data:
    driver: local
