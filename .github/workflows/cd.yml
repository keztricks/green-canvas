name: CD

on:
  push:
    branches: [master, beta]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: beta
        type: choice
        options: [prod, beta]

env:
  ECR_REPO: green-canvas

jobs:
  test:
    name: PHP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, sqlite3, zip, intl
          coverage: none

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies and build assets
        run: npm ci && npm run build

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run tests
        run: composer test

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')

    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Mask AWS account ID
        run: echo "::add-mask::$(aws sts get-caller-identity --query Account --output text)"

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name $ECR_REPO >/dev/null

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/$ECR_REPO:prod-${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Backup production database
        continue-on-error: true
        run: |
          BACKUP_KEY="backups/$(date +%Y%m%d_%H%M%S)"
          aws s3 sync \
            "s3://${{ secrets.LITESTREAM_BUCKET }}/database/database.sqlite/" \
            "s3://${{ secrets.LITESTREAM_BUCKET }}/$BACKUP_KEY/"
          echo "Backed up to $BACKUP_KEY"

      - name: Deploy App Runner service
        id: deploy
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
          ROLE_ARN: ${{ secrets.AWS_APPRUNNER_ECR_ROLE_ARN }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          LITESTREAM_REPLICA_URL: s3://${{ secrets.LITESTREAM_BUCKET }}/database/database.sqlite
          AWS_ACCESS_KEY_ID_VAL: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_VAL: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          SERVICE_NAME="green-canvas-prod"

          source_config() {
            jq -n \
              --arg image   "$IMAGE_URI" \
              --arg url     "$1" \
              --arg key     "$APP_KEY" \
              --arg role    "$ROLE_ARN" \
              --arg ver     "$APP_VERSION" \
              --arg ls      "$LITESTREAM_REPLICA_URL" \
              --arg aws_key "$AWS_ACCESS_KEY_ID_VAL" \
              --arg aws_sec "$AWS_SECRET_ACCESS_KEY_VAL" \
              '{
                ImageRepository: {
                  ImageIdentifier: $image,
                  ImageConfiguration: {
                    Port: "8080",
                    RuntimeEnvironmentVariables: {
                      APP_ENV:                "production",
                      APP_DEBUG:              "false",
                      APP_KEY:                $key,
                      APP_URL:                $url,
                      APP_VERSION:            $ver,
                      LOG_CHANNEL:            "stderr",
                      LITESTREAM_REPLICA_URL: $ls,
                      AWS_ACCESS_KEY_ID:      $aws_key,
                      AWS_SECRET_ACCESS_KEY:  $aws_sec
                    }
                  },
                  ImageRepositoryType: "ECR"
                },
                AutoDeploymentsEnabled: false,
                AuthenticationConfiguration: { AccessRoleArn: $role }
              }'
          }

          wait_running() {
            local arn="$1"
            sleep 6
            for i in $(seq 1 60); do
              STATUS=$(aws apprunner describe-service --service-arn "$arn" --query 'Service.Status' --output text)
              echo "  status: $STATUS"
              [ "$STATUS" = "RUNNING"        ] && return 0
              [ "$STATUS" = "CREATE_FAILED"  ] && echo "Create failed" && return 1
              [ "$STATUS" = "UPDATE_FAILED"  ] && echo "Update failed" && return 1
              sleep 10
            done
            echo "Timed out waiting for RUNNING" && return 1
          }

          EXISTING_ARN=$(aws apprunner list-services --output json \
            | jq -r --arg n "$SERVICE_NAME" \
                '.ServiceSummaryList[] | select(.ServiceName==$n) | .ServiceArn' \
            | head -1)

          if [ -n "$EXISTING_ARN" ]; then
            SERVICE_URL=$(aws apprunner describe-service \
              --service-arn "$EXISTING_ARN" \
              --query 'Service.ServiceUrl' --output text)

            echo "Updating existing service..."
            aws apprunner update-service \
              --service-arn "$EXISTING_ARN" \
              --source-configuration "$(source_config "https://$SERVICE_URL")" >/dev/null

            wait_running "$EXISTING_ARN"
          else
            echo "Creating new service..."
            CREATE_OUT=$(aws apprunner create-service \
              --service-name "$SERVICE_NAME" \
              --source-configuration "$(source_config "http://placeholder")" \
              --instance-configuration '{"Cpu":"0.5 vCPU","Memory":"1 GB"}')

            SERVICE_ARN=$(echo "$CREATE_OUT" | jq -r '.Service.ServiceArn')
            SERVICE_URL=$(echo "$CREATE_OUT" | jq -r '.Service.ServiceUrl')

            echo "Waiting for initial deploy..."
            wait_running "$SERVICE_ARN"

            echo "Updating with real APP_URL..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "$(source_config "https://$SERVICE_URL")" >/dev/null

            wait_running "$SERVICE_ARN"
            EXISTING_ARN="$SERVICE_ARN"
          fi

          echo "service_url=https://$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Report deployment
        run: echo "Production deployed ${{ steps.version.outputs.app_version }} to ${{ steps.deploy.outputs.service_url }}"

  deploy-beta:
    name: Deploy Beta
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/beta' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'beta')

    environment: beta

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          echo "app_version=${VERSION}-beta" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Mask AWS account ID
        run: echo "::add-mask::$(aws sts get-caller-identity --query Account --output text)"

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name $ECR_REPO >/dev/null

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/$ECR_REPO:beta-${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Sync production database to beta
        continue-on-error: true
        run: |
          aws s3 sync \
            "s3://${{ vars.LITESTREAM_BUCKET_PROD }}/database/database.sqlite/" \
            "s3://${{ secrets.LITESTREAM_BUCKET }}/database/database.sqlite/"
          echo "Database synced from prod to beta"

      - name: Deploy App Runner service
        id: deploy
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
          ROLE_ARN: ${{ secrets.AWS_APPRUNNER_ECR_ROLE_ARN }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          LITESTREAM_REPLICA_URL: s3://${{ secrets.LITESTREAM_BUCKET }}/database/database.sqlite
          AWS_ACCESS_KEY_ID_VAL: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_VAL: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          SERVICE_NAME="green-canvas-beta"

          source_config() {
            jq -n \
              --arg image   "$IMAGE_URI" \
              --arg url     "$1" \
              --arg key     "$APP_KEY" \
              --arg role    "$ROLE_ARN" \
              --arg ver     "$APP_VERSION" \
              --arg ls      "$LITESTREAM_REPLICA_URL" \
              --arg aws_key "$AWS_ACCESS_KEY_ID_VAL" \
              --arg aws_sec "$AWS_SECRET_ACCESS_KEY_VAL" \
              '{
                ImageRepository: {
                  ImageIdentifier: $image,
                  ImageConfiguration: {
                    Port: "8080",
                    RuntimeEnvironmentVariables: {
                      APP_ENV:                "staging",
                      APP_DEBUG:              "false",
                      APP_KEY:                $key,
                      APP_URL:                $url,
                      APP_VERSION:            $ver,
                      LOG_CHANNEL:            "stderr",
                      LITESTREAM_REPLICA_URL: $ls,
                      AWS_ACCESS_KEY_ID:      $aws_key,
                      AWS_SECRET_ACCESS_KEY:  $aws_sec
                    }
                  },
                  ImageRepositoryType: "ECR"
                },
                AutoDeploymentsEnabled: false,
                AuthenticationConfiguration: { AccessRoleArn: $role }
              }'
          }

          wait_running() {
            local arn="$1"
            sleep 6
            for i in $(seq 1 60); do
              STATUS=$(aws apprunner describe-service --service-arn "$arn" --query 'Service.Status' --output text)
              echo "  status: $STATUS"
              [ "$STATUS" = "RUNNING"        ] && return 0
              [ "$STATUS" = "CREATE_FAILED"  ] && echo "Create failed" && return 1
              [ "$STATUS" = "UPDATE_FAILED"  ] && echo "Update failed" && return 1
              sleep 10
            done
            echo "Timed out waiting for RUNNING" && return 1
          }

          EXISTING_ARN=$(aws apprunner list-services --output json \
            | jq -r --arg n "$SERVICE_NAME" \
                '.ServiceSummaryList[] | select(.ServiceName==$n) | .ServiceArn' \
            | head -1)

          if [ -n "$EXISTING_ARN" ]; then
            SERVICE_URL=$(aws apprunner describe-service \
              --service-arn "$EXISTING_ARN" \
              --query 'Service.ServiceUrl' --output text)

            echo "Updating existing service..."
            aws apprunner update-service \
              --service-arn "$EXISTING_ARN" \
              --source-configuration "$(source_config "https://$SERVICE_URL")" >/dev/null

            wait_running "$EXISTING_ARN"
          else
            echo "Creating new service..."
            CREATE_OUT=$(aws apprunner create-service \
              --service-name "$SERVICE_NAME" \
              --source-configuration "$(source_config "http://placeholder")" \
              --instance-configuration '{"Cpu":"0.25 vCPU","Memory":"0.5 GB"}')

            SERVICE_ARN=$(echo "$CREATE_OUT" | jq -r '.Service.ServiceArn')
            SERVICE_URL=$(echo "$CREATE_OUT" | jq -r '.Service.ServiceUrl')

            echo "Waiting for initial deploy..."
            wait_running "$SERVICE_ARN"

            echo "Updating with real APP_URL..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "$(source_config "https://$SERVICE_URL")" >/dev/null

            wait_running "$SERVICE_ARN"
          fi

          echo "service_url=https://$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Report deployment
        run: echo "Beta deployed ${{ steps.version.outputs.app_version }} to ${{ steps.deploy.outputs.service_url }}"
